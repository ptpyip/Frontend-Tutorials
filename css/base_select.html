<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Select</title>
    <!-- use global.css -->
    <link rel="stylesheet" href="../global.css">
</head>
<body> 
    <!-- NOTE: style the div with: `Programming Languages: <select>` (horizontal); keep original height. -->
    <div class="prog_lang" style="display: flex; align-items: center;">
        <p style="margin-right: 10px;">Programming Languages:</p>
        <select name="Programming Languages" id="prog_lang_select">
            <option value="Python">Python</option>
            <option value="C++">C++</option>
            <option value="Java">Java</option>
            <option value="JavaScript">JavaScript</option>
            <option value="Zig">Zig</option>
        </select>
    </div>

    <style>
        select {
            appearance: base-select;

            /* No need override when setting appearance 
            -webkit-appearance: none;
            -moz-appearance: none; 
            */
        }

        /* BUG: Cannot test option style on macOS */
        /* select option {
            background-color: red;
            padding: 10px;
        } */
        
    </style>
</body>
</html>
